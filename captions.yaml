# Configuração do gerador de legendas.
# Todos os parâmetros são opcionais e possuem valores padrão.

font: "fonts/Outfit/static/Outfit-SemiBold.ttf"  # caminho do arquivo .ttf da fonte
font_color: "#FFFFFF"   # cor do texto (hex #RRGGBB)
stroke_color: "#000000" # cor do contorno das letras (hex #RRGGBB)
stroke_width: auto      # espessura do contorno: auto (proporcional) ou um número, ex.: 3
background_color: "#000000" # cor da faixa de fundo atrás do texto (hex #RRGGBB)
background_opacity: 0   # opacidade do fundo, de 0 (sem fundo) a 255 (opaco)
position: top           # posição vertical do texto: top | center | bottom
safe_margin: 0.10       # margem de segurança nas bordas (fração da menor dimensão da imagem)
max_text_width: 0.42    # largura máxima do texto (fração da largura da imagem)
line_spacing: 0.05      # espaço entre linhas: multiplicador da altura da linha; menor = mais juntas (auto = 0.25)
letter_spacing: auto    # espaço entre letras: auto (0) ou um número em pixels
preview: false          # true = processa só a primeira imagem (para testar rápido)

# A associação é feita pela ORDEM ALFABÉTICA dos arquivos em input/.
# A quantidade de legendas deve ser igual à quantidade de imagens.
captions:
  - 2 CASAS DE CASEIROS
  - SEDE COM AMPLA ÁREA VERDE AO REDOR
  - CASA PRINCIPAL
  - ÁREA GOURMET
